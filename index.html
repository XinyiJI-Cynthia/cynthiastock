<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>股票每日信息台</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="site-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">S</span>
            <div>
              <h1>股票每日信息台</h1>
              <p id="lastUpdated">等待更新</p>
            </div>
          </div>
          <div class="header-actions">
            <button class="icon-button" id="refreshButton" type="button" title="刷新">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.2 6.5M3 12A9 9 0 0 1 18.2 5.5"></path>
                <path d="M21 4v6h-6M3 20v-6h6"></path>
              </svg>
              <span class="sr-only">刷新</span>
            </button>
            <button class="icon-button" id="settingsButton" type="button" title="关注列表">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16"></path>
                <path d="M8 7v10M16 7v10"></path>
              </svg>
              <span class="sr-only">关注列表</span>
            </button>
          </div>
        </div>

        <div class="quote-strip" id="quoteStrip" aria-live="polite"></div>
      </header>

      <main>
        <section class="control-band" aria-label="筛选">
          <div class="stock-tabs" id="stockTabs"></div>

          <div class="filters">
            <label class="select-label">
              <span>范围</span>
              <select id="rangeSelect">
                <option value="1">24小时</option>
                <option value="7" selected>7天</option>
                <option value="30">30天</option>
              </select>
            </label>

            <div class="segmented" id="sourceFilter" role="tablist" aria-label="来源">
              <button class="is-active" type="button" data-source="all">全部</button>
              <button type="button" data-source="domestic">国内</button>
              <button type="button" data-source="global">国外</button>
            </div>
          </div>

          <div class="segmented signal-tabs" id="signalFilter" role="tablist" aria-label="信号">
            <button class="is-active" type="button" data-signal="all">全部</button>
            <button type="button" data-signal="positive">利好</button>
            <button type="button" data-signal="negative">利空</button>
            <button type="button" data-signal="neutral">中性</button>
          </div>
        </section>

        <section class="summary-grid" id="summaryGrid" aria-live="polite"></section>

        <section class="feed-section">
          <div class="section-heading">
            <div>
              <h2 id="feedTitle">信息流</h2>
              <p id="feedMeta">国内外公开来源</p>
            </div>
            <a id="officialLink" class="text-link" target="_blank" rel="noopener">公告入口</a>
          </div>

          <div class="status-line" id="statusLine"></div>
          <div class="feed-list" id="feedList"></div>
        </section>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog">
      <form method="dialog" class="settings-panel">
        <div class="dialog-head">
          <div>
            <h2>关注列表</h2>
            <p>本机保存</p>
          </div>
          <button class="icon-button" value="close" type="submit" title="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
            <span class="sr-only">关闭</span>
          </button>
        </div>

        <div class="watchlist-editor" id="watchlistEditor"></div>

        <div class="editor-form">
          <label>
            名称
            <input id="newName" autocomplete="off" placeholder="例如：三一重工">
          </label>
          <label>
            代码
            <input id="newCode" autocomplete="off" inputmode="numeric" placeholder="例如：600031">
          </label>
          <label>
            交易所
            <select id="newExchange">
              <option value="sh">上海</option>
              <option value="sz">深圳</option>
            </select>
          </label>
        </div>

        <div class="dialog-actions">
          <button class="secondary-button" id="resetStocksButton" type="button">恢复默认</button>
          <button class="primary-button" id="addStockButton" type="button">添加</button>
        </div>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
